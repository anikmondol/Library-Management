<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password || Neptune Library</title>

  <link rel="shortcut icon" href="./asset/images/neptune.png" type="image/x-icon">

  <!-- ======== Bootstrap css Link ======== -->
  <link rel="stylesheet" href="asset/css/bootstrap.min.css">

  <!-- ======== Custom css Link ======== -->
  <link rel="stylesheet" href="asset/css/style.css">

  <!-- ======== Google Font Link ======== -->
  <link rel="stylesheet" href="asset/css/font.css">

  <!-- ======== Font Awesome Link ======== -->
  <link rel="stylesheet" href="asset/css/all.min.css">

  <!-- ========  Swiper Js Link ======== -->
  <link rel="stylesheet" href="asset/css/swiper-bundle.min.css">

</head>

<body style="background-color: #212529;">

  <!-- main content start -->
  <main class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row">
      <div class="col-md-12 login-form">
        <div class="card mb-3" style="max-width: 900px;">
          <div class="row g-0">
            <div class="col-md-5">
              <img src="./asset/images/library-image.png" class="img-fluid h-100 rounded-start"
                alt="library management system image">
            </div>
            <div class="col-md-7">
              <div class="card-body">
                <h4 class="card-title text-uppercase fw-medium">Neptune Library</h4>
                <p class="card-text">Enter email to login</p>
                <form action="./reset-password.html">
                  <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                  </div>
                  <button type="submit" class="btn btn-primary">Submit</button>
                </form>
                <hr>
                <a href="./index.html" class="card-link link-underline-light">Login</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <!-- main content end -->




  <!-- ======== Bootstrap js Link ======== -->
  <script src="asset/js/bootstrap.bundle.min.js"></script>

  <!-- ======== Custom js Link ======== -->
  <script src="asset/js/script.js"></script>

  <!-- ======== Swiper js Link ======== -->
  <script src="asset/js/swiper-bundle.min.js"></script>

</body>

</html>
